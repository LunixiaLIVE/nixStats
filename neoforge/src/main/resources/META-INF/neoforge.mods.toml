modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"

[[mods]]
    modId = "nixstats"
    version = "${version}"
    displayName = "nixStats"
    description = "Configurable stat sidebar HUD. Track phantom timer, blocks mined, entities killed, and any other Minecraft statistic."
    displayURL = "https://github.com/LunixiaLIVE/Lunixia-Minecraft-QOL-Mods"

[[dependencies.nixstats]]
    modId = "neoforge"
    type = "required"
    versionRange = "[26.1,26.2)"
    ordering = "NONE"
    side = "CLIENT"

[[dependencies.nixstats]]
    modId = "minecraft"
    type = "required"
    versionRange = "[26.1,26.2)"
    ordering = "NONE"
    side = "CLIENT"
